<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6f4cff">
  <title>واجهة الضيف — Orlixor</title>
  <script>
    (() => {
      try {
        const params = new URLSearchParams(window.location.search);
        const isMobile = window.matchMedia("(max-width: 768px)").matches;
        if (isMobile && !params.has("desktop")) {
          window.location.replace("mobile.html");
        }
      } catch (_) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="orlixor-icon.png?v=20260515-mobile-v2-009">
  <link rel="stylesheet" href="section-preview-mobile.css?v=20260518-chat-fix-004">
  <link rel="stylesheet" href="mobile-shell.css?v=20260516-home-compact-001">
</head>
<body class="orlixor-guest-page">
  <div id="orlixor-mobile-v2"></div>
  <main id="sectionApp" class="guest-root"></main>
  <script src="mullem-config.js?v=20260518-chat-fix-004"></script>
  <script>
    (() => {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((registrations) => registrations.forEach((registration) => registration.unregister()))
          .catch(() => {});
      }
      if ("caches" in window) {
        caches.keys()
          .then((keys) => keys.forEach((key) => caches.delete(key)))
          .catch(() => {});
      }
    })();
  </script>
  <script src="api-client.js?v=20260518-chat-fix-004"></script>
  <script src="section-pages.js?v=20260518-chat-fix-004"></script>
</body>
</html>
