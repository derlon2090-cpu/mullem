<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Orlixor Mobile</title>
  <style>
    :root {
      --primary: #6d4aff;
      --primary-2: #7c52ff;
      --primary-soft: #f4f0ff;
      --text: #15152f;
      --muted: #8b91ad;
      --line: rgba(109, 74, 255, 0.13);
      --shadow: 0 18px 50px rgba(35, 30, 68, 0.08);
      --soft-shadow: 0 10px 28px rgba(35, 30, 68, 0.055);
      font-family: "Cairo", "Tajawal", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 0;
      margin: 0;
      overflow-x: hidden;
      background: #ffffff;
      color: var(--text);
      color-scheme: light;
    }

    body {
      min-height: 100dvh;
      direction: rtl;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .mobile-page {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      margin: 0 auto;
      padding: 0 16px 158px;
      background: #ffffff;
      position: relative;
    }

    .mobile-page main {
      padding-top: 12px;
    }

    .mobile-page.has-mobile-section main {
      padding-top: 8px;
    }

    .mobile-header {
      height: 82px;
      display: grid;
      grid-template-columns: 46px minmax(92px, 1fr) auto;
      align-items: center;
      gap: 8px;
      direction: ltr;
      border-bottom: 1px solid rgba(109, 74, 255, 0.08);
      background: rgba(255, 255, 255, 0.96);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 15px;
      background: #ffffff;
      color: #0f1530;
      display: grid;
      place-items: center;
      padding: 0;
      box-shadow: 0 10px 24px rgba(21, 21, 47, 0.07);
    }

    .icon-btn svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.15;
    }

    .header-logo {
      justify-self: center;
      width: auto;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 7px;
      color: var(--text);
      text-decoration: none;
      font-size: 17px;
      font-weight: 900;
    }

    .header-logo img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 8px 18px rgba(109, 74, 255, 0.15));
    }

    .header-logo span {
      direction: ltr;
      letter-spacing: 0;
      line-height: 1;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      direction: ltr;
    }

    .plain-icon-btn,
    .drawer-btn {
      border: 0;
      background: transparent;
      color: #141833;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .plain-icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(21, 21, 47, 0.06);
    }

    .avatar-btn {
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .plain-icon-btn svg,
    .drawer-btn svg {
      width: 24px;
      height: 24px;
      stroke-width: 2.08;
    }

    .xp-pill {
      height: 40px;
      border: 1.5px solid #22c994;
      border-radius: 13px;
      background: #ffffff;
      color: #222545;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 12px 28px rgba(34, 201, 148, 0.12);
      direction: rtl;
    }

    .xp-pill svg {
      width: 16px;
      height: 16px;
      color: #22c994;
      stroke-width: 2.35;
    }

    .device-pill {
      display: none;
      width: fit-content;
      height: 52px;
      min-width: 108px;
      margin: 20px auto 34px;
      padding: 0 22px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary-2), #6133ed);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 18px 36px rgba(109, 74, 255, 0.3);
      direction: ltr;
    }

    .device-pill svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.4;
    }

    .hero {
      text-align: center;
      margin: 14px 0 18px;
    }

    .hero h1 {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 32px;
      line-height: 1.14;
      font-weight: 900;
      letter-spacing: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-direction: row-reverse;
      direction: ltr;
    }

    .hero-text {
      direction: rtl;
      unicode-bidi: plaintext;
    }

    .hero-emoji {
      font-size: 30px;
      line-height: 1;
    }

    .hero p {
      margin: 0;
      color: #58617f;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 700;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
      margin-top: 10px;
    }

    .action-card {
      width: 100%;
      min-height: 108px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: var(--soft-shadow);
      display: grid;
      grid-template-columns: 1fr;
      justify-items: center;
      align-content: center;
      gap: 8px;
      padding: 12px 8px;
      direction: rtl;
      text-align: center;
    }

    .cards .action-card:nth-child(n + 4) {
      display: none;
    }

    .card-icon {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: var(--primary-soft);
      color: var(--primary);
      display: grid;
      place-items: center;
      grid-column: auto;
      justify-self: center;
    }

    .card-icon svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.35;
    }

    .card-copy {
      min-width: 0;
      direction: rtl;
      grid-column: auto;
      justify-self: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 0;
      width: 100%;
    }

    .card-copy b {
      display: block;
      margin: 0;
      color: var(--text);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 900;
      direction: rtl;
      unicode-bidi: plaintext;
      white-space: normal;
    }

    .card-copy small {
      display: block;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.35;
      font-weight: 700;
      direction: rtl;
      unicode-bidi: plaintext;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .composer {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      width: auto;
      max-width: 398px;
      min-height: 148px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: #ffffff;
      box-shadow: 0 16px 38px rgba(35, 30, 68, 0.08);
      padding: 16px;
      display: grid;
      gap: 14px;
      z-index: 30;
    }

    .composer input {
      width: 100%;
      height: 42px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      text-align: right;
      font-size: 16px;
      font-weight: 700;
      padding: 0;
    }

    .composer input::placeholder {
      color: #a3a8bb;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      direction: ltr;
    }

    .send-btn {
      width: 58px;
      height: 58px;
      min-width: 58px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #784dff, #6035f0);
      color: #ffffff;
      box-shadow: 0 15px 34px rgba(109, 74, 255, 0.34);
      display: grid;
      place-items: center;
      padding: 0;
      margin-inline-end: auto;
    }

    .send-btn svg {
      width: 25px;
      height: 25px;
      stroke-width: 2.1;
    }

    .chip-btn {
      min-height: 42px;
      border: 1px solid rgba(109, 74, 255, 0.12);
      border-radius: 999px;
      background: #ffffff;
      color: #535b78;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 14px;
      font-size: 14px;
      font-weight: 850;
      white-space: nowrap;
    }

    .chip-btn svg {
      width: 18px;
      height: 18px;
      color: var(--primary);
      stroke-width: 2.2;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17, 18, 34, 0.42);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 70;
    }

    .drawer {
      position: fixed;
      inset: 0 auto 0 0;
      width: min(82vw, 342px);
      background: #ffffff;
      box-shadow: 24px 0 60px rgba(21, 21, 47, 0.18);
      border-radius: 0 28px 28px 0;
      transform: translateX(-105%);
      transition: transform 0.24s ease;
      z-index: 80;
      overflow: hidden;
      direction: rtl;
    }

    body.is-drawer-open {
      overflow: hidden;
    }

    body.is-drawer-open .drawer-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    body.is-drawer-open .drawer {
      transform: translateX(0);
    }

    .drawer-head {
      height: 78px;
      padding: 0 18px;
      display: grid;
      grid-template-columns: 42px 1fr 42px;
      align-items: center;
      direction: ltr;
      border-bottom: 1px solid rgba(109, 74, 255, 0.08);
    }

    .drawer-logo {
      width: 42px;
      height: 42px;
      object-fit: contain;
      justify-self: center;
    }

    .drawer-btn {
      width: 24px;
      height: 24px;
      justify-self: center;
    }

    .drawer-nav {
      display: grid;
      gap: 26px;
      padding: 28px 28px 28px 24px;
    }

    .drawer-link {
      border: 0;
      background: transparent;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: right;
      direction: ltr;
      color: #2a2f48;
      font-size: 17px;
      font-weight: 700;
    }

    .drawer-link span {
      direction: rtl;
      unicode-bidi: plaintext;
    }

    .drawer-link svg {
      width: 23px;
      height: 23px;
      color: var(--primary);
      stroke-width: 2.1;
      flex: 0 0 23px;
    }

    @media (max-width: 390px) {
      .mobile-page {
        padding-inline: 14px;
        padding-bottom: 148px;
      }

      .mobile-header {
        height: 76px;
        grid-template-columns: 40px minmax(78px, 1fr) auto;
        gap: 6px;
      }

      .menu-btn {
        width: 38px;
        height: 38px;
        border-radius: 13px;
      }

      .header-logo img {
        width: 35px;
        height: 35px;
      }

      .header-logo span {
        font-size: 15px;
      }

      .header-actions {
        gap: 6px;
      }

      .xp-pill {
        height: 36px;
        padding: 0 8px;
        font-size: 11px;
        border-radius: 12px;
      }

      .plain-icon-btn {
        width: 36px;
        height: 36px;
      }

      .device-pill {
        height: 42px;
        min-width: 94px;
        margin: 16px auto 22px;
        padding-inline: 17px;
        font-size: 15px;
      }

      .hero {
        margin-bottom: 18px;
      }

      .hero h1 {
        font-size: 28px;
        margin-bottom: 7px;
      }

      .hero-emoji {
        font-size: 26px;
      }

      .hero p {
        font-size: 14px;
      }

      .cards {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .action-card {
        min-height: 98px;
        grid-template-columns: 1fr;
        gap: 7px;
        border-radius: 17px;
        padding: 10px 6px;
      }

      .card-icon {
        width: 40px;
        height: 40px;
        border-radius: 14px;
      }

      .card-icon svg {
        width: 20px;
        height: 20px;
      }

      .card-copy b {
        font-size: 11px;
        margin-bottom: 0;
      }

      .card-copy small {
        font-size: 9px;
      }

      .composer {
        left: 14px;
        right: 14px;
        bottom: calc(12px + env(safe-area-inset-bottom));
        min-height: 126px;
        padding: 13px;
        border-radius: 23px;
        gap: 10px;
      }

      .composer input {
        height: 38px;
        font-size: 15px;
      }

      .send-btn {
        width: 50px;
        height: 50px;
        min-width: 50px;
      }

      .chip-btn {
        min-height: 38px;
        padding: 8px 12px;
        font-size: 13px;
      }

      .drawer {
        width: min(83vw, 332px);
      }

      .drawer-head {
        height: 74px;
        padding: 0 16px;
      }

      .drawer-nav {
        gap: 22px;
        padding: 24px 24px 24px 22px;
      }
    }
    .mobile-page.has-mobile-section {
      padding-bottom: 34px;
    }

    .mobile-page.has-mobile-section .device-pill,
    .mobile-page.has-mobile-section .hero,
    .mobile-page.has-mobile-section .cards {
      display: none;
    }

    .mobile-page.has-mobile-section .composer {
      display: none;
    }

    .mobile-section {
      padding: 14px 0 28px;
      display: grid;
      gap: 12px;
    }

    .section-head {
      text-align: center;
      display: grid;
      gap: 8px;
      margin-bottom: 4px;
    }

    .section-topbar {
      min-height: 42px;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 42px;
      align-items: center;
      gap: 8px;
      direction: ltr;
    }

    .section-back {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      color: #15152f;
      display: grid;
      place-items: center;
      box-shadow: var(--soft-shadow);
      padding: 0;
    }

    .section-back svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.2;
    }

    .section-head h1 {
      margin: 0;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
      line-height: 1.25;
      letter-spacing: 0;
      direction: rtl;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.6;
    }

    .section-search {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #ffffff;
      box-shadow: var(--soft-shadow);
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      color: #a0a6bf;
    }

    .section-search svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.15;
    }

    .section-search input {
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      text-align: right;
      font-size: 13px;
      font-weight: 800;
    }

    .section-search input::placeholder {
      color: #b8bdd0;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 1px 4px;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .filter-chip {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      color: var(--muted);
      padding: 7px 13px;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 900;
      box-shadow: var(--soft-shadow);
    }

    .filter-chip.active {
      color: var(--primary);
      background: var(--primary-soft);
      border-color: rgba(109, 74, 255, 0.32);
    }

    .primary-section-btn {
      min-height: 50px;
      width: 100%;
      border: 0;
      border-radius: 17px;
      background: linear-gradient(135deg, var(--primary-2), var(--primary));
      color: #ffffff;
      box-shadow: 0 15px 30px rgba(109, 74, 255, 0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-size: 14px;
      font-weight: 900;
    }

    .section-list {
      display: grid;
      gap: 11px;
    }

    .section-card,
    .tool-card,
    .settings-row,
    .state-card,
    .logout-card {
      border: 1px solid var(--line);
      border-radius: 17px;
      background: #ffffff;
      box-shadow: var(--soft-shadow);
    }

    .section-card {
      width: 100%;
      min-height: 68px;
      padding: 12px;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      text-align: right;
      color: var(--text);
    }

    .section-icon,
    .tool-icon,
    .settings-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--primary-soft);
      color: var(--primary);
      display: grid;
      place-items: center;
    }

    .section-icon svg,
    .tool-icon svg,
    .settings-icon svg {
      width: 21px;
      height: 21px;
    }

    .section-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .section-copy b,
    .tool-card b,
    .settings-row b {
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-copy small,
    .tool-card small,
    .settings-row small,
    .state-card p,
    .logout-card p,
    .logout-card small {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.55;
    }

    .section-meta {
      color: #9aa0bd;
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .tool-card {
      min-height: 118px;
      padding: 14px 12px;
      display: grid;
      justify-items: center;
      align-content: center;
      text-align: center;
      gap: 8px;
      color: var(--text);
    }

    .model-card.is-active {
      border-color: rgba(109, 74, 255, 0.4);
      background: #fbf9ff;
    }

    .model-pill {
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 7px 11px;
      font-size: 10px;
      font-weight: 900;
    }

    .settings-list {
      display: grid;
      gap: 11px;
    }

    .settings-row {
      min-height: 72px;
      padding: 12px;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
    }

    .settings-row button,
    .settings-row select {
      min-height: 32px;
      max-width: 96px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--primary);
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 900;
    }

    .state-card,
    .logout-card {
      padding: 24px 18px;
      text-align: center;
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .logout-card {
      margin-top: 48px;
      padding: 36px 22px;
    }

    .logout-mark {
      width: 60px;
      height: 60px;
      border-radius: 20px;
      background: var(--primary-soft);
      display: grid;
      place-items: center;
    }

    .logout-mark img {
      width: 38px;
      height: 38px;
    }

    .logout-card h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      color: var(--text);
    }

    .logout-actions {
      width: 100%;
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .logout-confirm,
    .logout-cancel {
      min-height: 48px;
      border: 0;
      border-radius: 15px;
      font-size: 14px;
      font-weight: 900;
    }

    .logout-confirm {
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary-2), var(--primary));
      box-shadow: 0 15px 30px rgba(109, 74, 255, 0.25);
    }

    .logout-cancel {
      color: #666d89;
      background: #f5f6fb;
    }

    .drawer-link.is-active {
      color: var(--primary);
      background: var(--primary-soft);
    }

    .xp-panel-backdrop {
      position: fixed;
      inset: 0;
      z-index: 88;
      background: rgba(24, 24, 45, 0.16);
      backdrop-filter: blur(2px);
    }

    .xp-panel {
      position: fixed;
      left: 18px;
      right: 18px;
      top: 104px;
      z-index: 90;
      max-width: 390px;
      margin: 0 auto;
      padding: 18px;
      border: 1px solid rgba(109, 74, 255, 0.16);
      border-radius: 22px;
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(35, 30, 68, 0.18);
      display: grid;
      gap: 14px;
    }

    .xp-panel[hidden],
    .xp-panel-backdrop[hidden] {
      display: none;
    }

    .xp-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .xp-panel-head h2 {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      font-weight: 900;
    }

    .xp-close {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 12px;
      background: var(--primary-soft);
      color: var(--primary);
      display: grid;
      place-items: center;
      padding: 0;
    }

    .xp-close svg {
      width: 18px;
      height: 18px;
    }

    .xp-plan {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #333650;
      font-size: 13px;
      font-weight: 900;
    }

    .xp-panel-list {
      display: grid;
      gap: 10px;
    }

    .xp-panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: #626a88;
      font-size: 12px;
      font-weight: 800;
    }

    .xp-panel-row b {
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    .xp-upgrade {
      min-height: 46px;
      border: 0;
      border-radius: 14px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary), #c33df0);
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 15px 30px rgba(109, 74, 255, 0.24);
    }

    @media (prefers-color-scheme: dark) {
      html,
      body,
      .mobile-page {
        background: #ffffff;
        color: var(--text);
      }

      .mobile-header,
      .drawer,
      .section-search,
      .filter-chip,
      .section-card,
      .tool-card,
      .settings-row,
      .state-card,
      .logout-card,
      .xp-panel,
      .plain-icon-btn,
      .section-back,
      .xp-pill,
      .action-card,
      .composer,
      .chip-btn {
        background: #ffffff;
        border-color: var(--line);
      }

      .section-head h1,
      .section-copy b,
      .tool-card b,
      .settings-row b,
      .logout-card h2,
      .drawer-link,
      .xp-panel-head h2,
      .xp-panel-row b,
      .card-copy b,
      .hero h1 {
        color: var(--text);
      }

      .section-search input,
      .section-search input::placeholder,
      .section-copy small,
      .tool-card small,
      .settings-row small,
      .state-card p,
      .logout-card p,
      .logout-card small,
      .card-copy small,
      .hero p,
      .xp-panel-row {
        color: var(--muted);
      }
    }
  </style>
</head>
<body>

      <button class="drawer-link" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M9.8 9a2.4 2.4 0 0 1 4.6 1.2c0 1.8-2.4 2.1-2.4 3.8M12 17h.01"/></svg><span>المساعدة</span></button>
      <button class="drawer-link" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 17l-5-5 5-5M5 12h13M19 4v16"/></svg><span>تسجيل الخروج</span></button>

  <script>
    (function () {
      var composer = document.getElementById("mobileComposer");
      var body = document.body;
      var mobilePage = document.querySelector(".mobile-page");
      var main = document.querySelector("[data-mobile-main]");
      var openButtons = document.querySelectorAll("[data-drawer-open]");
      var closeButtons = document.querySelectorAll("[data-drawer-close]");
      var backdrop = document.querySelector("[data-drawer-backdrop]");
      var xpPanel = document.querySelector("[data-xp-panel]");
      var xpOpen = document.querySelector("[data-xp-open]");
      var xpCloseButtons = document.querySelectorAll("[data-xp-close]");
      var drawerLinks = Array.prototype.slice.call(document.querySelectorAll(".drawer-link"));
      var homeMarkup = main ? main.innerHTML : "";
      var activeModel = getSavedModel();
      var navSections = [
        { key: "messages", label: "المحادثات" },
        { key: "files", label: "الملفات" },
        { key: "tools", label: "الأدوات" },
        { key: "models", label: "النماذج" },
        { key: "settings", label: "الإعدادات" },
        { key: "help", label: "المساعدة" },
        { key: "logout", label: "تسجيل الخروج" }
      ];

      function getSavedModel() {
        try {
          return localStorage.getItem("orlixorMobileModel") || "orlixor-ai";
        } catch (error) {
          return "orlixor-ai";
        }
      }

      function saveModel(modelKey) {
        activeModel = modelKey || "orlixor-ai";
        try {
          localStorage.setItem("orlixorMobileModel", activeModel);
        } catch (error) {
          // Storage can be unavailable in some private browsing modes.
        }
      }

      function setDrawerOpen(isOpen) {
        body.classList.toggle("is-drawer-open", isOpen);
        openButtons.forEach(function (button) {
          button.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });
      }

      function setXpPanelOpen(isOpen) {
        if (!xpPanel) return;
        xpPanel.hidden = !isOpen;
        xpCloseButtons.forEach(function (button) {
          if (button.classList.contains("xp-panel-backdrop")) {
            button.hidden = !isOpen;
          }
        });
      }

      function iconSvg(name) {
        var icons = {
          messages: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>',
          files: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"/><path d="M14 2v5h5"/></svg>',
          tools: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="4" width="6" height="6" rx="1.5"/><rect x="14" y="4" width="6" height="6" rx="1.5"/><rect x="4" y="14" width="6" height="6" rx="1.5"/><rect x="14" y="14" width="6" height="6" rx="1.5"/></svg>',
          models: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3 4 7l8 4 8-4-8-4z"/><path d="M4 12l8 4 8-4M4 17l8 4 8-4"/></svg>',
          settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 8.6 15a1.7 1.7 0 0 0-1.88-.34l-.08.03a2 2 0 1 1-1.53-3.7l.08-.03A1.7 1.7 0 0 0 5.6 9a1.7 1.7 0 0 0-.6-1l-.06-.06A2 2 0 1 1 7.77 5.1l.06.06A1.7 1.7 0 0 0 9 5.6a1.7 1.7 0 0 0 1-.6l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 15 8.6c.4 0 .78-.12 1.1-.36l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 18.4 13c0 .4.12.78.36 1.1z"/></svg>',
          help: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M9.8 9a2.4 2.4 0 0 1 4.6 1.2c0 1.8-2.4 2.1-2.4 3.8M12 17h.01"/></svg>',
          logout: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 17l-5-5 5-5M5 12h13M19 4v16"/></svg>',
          search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
          plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>',
          upload: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 20h14"/></svg>',
          shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
        };

        return icons[name] || icons.tools;
      }

      function searchBox(placeholder) {
        return '<label class="section-search">' + iconSvg("search") + '<input type="search" data-section-search placeholder="' + placeholder + '"></label>';
      }

      function filterRow(items) {
        return '<div class="filter-row" role="tablist">' + items.map(function (item, index) {
          return '<button class="filter-chip' + (index === 0 ? " active" : "") + '" type="button" data-filter-chip="' + item + '">' + item + '</button>';
        }).join("") + '</div>';
      }

      function stateBlocks(emptyText) {
        return '<div class="state-card" data-loading-state hidden><p>جاري التحميل...</p></div>' +
          '<div class="state-card" data-error-state hidden><p>تعذر تحميل هذا القسم الآن.</p></div>' +
          '<div class="state-card" data-empty-state hidden><p>' + emptyText + '</p></div>' +
          '<div class="state-card" data-section-notice hidden><p></p></div>';
      }

      function sectionShell(key, title, subtitle, bodyHtml) {
        return '<section class="mobile-section" data-section-key="' + key + '">' +
          '<header class="section-head"><div class="section-topbar"><button class="section-back" type="button" data-mobile-home aria-label="الرجوع للرئيسية"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg></button><h1>' + title + '</h1><span></span></div><p>' + subtitle + '</p></header>' +
          bodyHtml +
          '</section>';
      }

      function listCard(iconName, title, subtitle, meta, action) {
        return '<button class="section-card" type="button" data-section-action="' + (action || title) + '">' +
          '<span class="section-icon">' + iconSvg(iconName) + '</span>' +
          '<span class="section-copy"><b>' + title + '</b><small>' + subtitle + '</small></span>' +
          '<span class="section-meta">' + meta + '</span>' +
          '</button>';
      }

      function renderMessages() {
        var cards = [
          listCard("messages", "محادثة جديدة", "ابدأ جلسة Orlixor AI مرتبة وسريعة", "الآن", "new-chat"),
          listCard("messages", "كتابة محتوى", "أفكار وصياغة منشورات احترافية", "اليوم", "open-chat"),
          listCard("messages", "تحليل البيانات", "تحليل مبسط للملف والنتائج", "أمس", "open-chat"),
          listCard("messages", "مساعدة برمجية", "حل مشكلة كود ومراجعة منطقية", "هذا الأسبوع", "open-chat"),
          listCard("messages", "تلخيص مقال", "تلخيص واضح مع نقاط مهمة", "المفضلة", "open-chat")
        ].join("");

        return sectionShell("messages", "المحادثات", "عرض جميع محادثاتك والبحث فيها وإدارتها بسهولة.",
          searchBox("ابحث في محادثاتك...") +
          filterRow(["الكل", "اليوم", "المفضلة"]) +
          '<button class="primary-section-btn" type="button" data-section-action="new-chat">' + iconSvg("plus") + 'محادثة جديدة</button>' +
          '<div class="section-list" data-search-list>' + cards + '</div>' +
          stateBlocks("لا توجد محادثات مطابقة لبحثك."));
      }

      function renderFiles() {
        var cards = [
          listCard("files", "تقرير تحليل البيانات.pdf", "PDF - 1.4 MB", "PDF", "file-detail"),
          listCard("files", "ملخص المشروع.docx", "Word - 2.1 MB", "Word", "file-detail"),
          listCard("files", "الجداول.xlsx", "Excel - 900 KB", "Excel", "file-detail"),
          listCard("files", "المخطط.png", "صورة - 1.8 MB", "صور", "file-detail")
        ].join("");

        return sectionShell("files", "الملفات", "رفع وإدارة جميع ملفاتك والوصول إليها بسرعة.",
          searchBox("ابحث في ملفاتك...") +
          filterRow(["الكل", "PDF", "صور", "Word", "Excel"]) +
          '<button class="primary-section-btn" type="button" data-section-action="upload-file">' + iconSvg("upload") + 'رفع ملف</button>' +
          '<div class="section-list" data-search-list>' + cards + '</div>' +
          stateBlocks("لا توجد ملفات مطابقة."));
      }

      function toolCard(iconName, title, subtitle) {
        return '<button class="tool-card" type="button" data-section-action="' + title + '">' +
          '<span class="tool-icon">' + iconSvg(iconName) + '</span>' +
          '<b>' + title + '</b><small>' + subtitle + '</small>' +
          '</button>';
      }

      function renderTools() {
        return sectionShell("tools", "الأدوات", "مجموعة أدوات ذكية متنوعة لإنجاز مهام مختلفة.",
          '<div class="tool-grid">' +
          toolCard("files", "تلخيص النصوص", "اختصر النصوص الطويلة بوضوح") +
          toolCard("help", "ترجمة", "ترجمة النصوص بدقة وسياق") +
          toolCard("messages", "كتابة مقال", "بناء مقال منظم واحترافي") +
          toolCard("files", "تحليل ملف", "قراءة وتحليل الملفات المهمة") +
          toolCard("models", "توليد أفكار", "اقتراح أفكار جديدة وسريعة") +
          toolCard("tools", "تحسين نص", "تنقيح وصياغة أفضل للنص") +
          '</div>' +
          stateBlocks("لا توجد أدوات متاحة حاليًا."));
      }

      function modelCard(key, title, subtitle, pill) {
        return '<button class="section-card model-card' + (activeModel === key ? " is-active" : "") + '" type="button" data-model-key="' + key + '">' +
          '<span class="section-icon">' + iconSvg("models") + '</span>' +
          '<span class="section-copy"><b>' + title + '</b><small>' + subtitle + '</small></span>' +
          '<span class="model-pill">' + pill + '</span>' +
          '</button>';
      }

      function renderModels() {
        return sectionShell("models", "النماذج", "اختر النموذج المناسب لاحتياجك بدون عرض تفاصيل التكلفة.",
          '<div class="section-list" data-search-list>' +
          modelCard("orlixor-ai", "Orlixor AI", "للشرح والكتابة والأسئلة العامة", "الافتراضي") +
          modelCard("orlixor-turbo", "Orlixor AI Turbo", "أسرع استجابة للمهام اليومية", "سريع") +
          modelCard("orlixor-pro", "Orlixor AI Pro", "لتحليل أعمق ونتائج دقيقة", "تحليل") +
          modelCard("orlixor-creative", "Orlixor AI Creative", "للكتابة الإبداعية وصناعة المحتوى", "إبداع") +
          '</div>' +
          stateBlocks("لا توجد نماذج متاحة."));
      }

      function settingsRow(iconName, title, subtitle, action) {
        return '<button class="settings-row" type="button" data-section-action="' + (action || title) + '">' +
          '<span class="settings-icon">' + iconSvg(iconName) + '</span>' +
          '<span class="section-copy"><b>' + title + '</b><small>' + subtitle + '</small></span>' +
          '<span class="section-meta">›</span>' +
          '</button>';
      }

      function renderSettings() {
        return sectionShell("settings", "الإعدادات", "إدارة إعدادات حسابك والتطبيق والخصوصية.",
          '<div class="settings-list">' +
          settingsRow("messages", "معلومات الحساب", "اسمك، بريدك، وحالة الحساب") +
          settingsRow("help", "اللغة", "العربية") +
          settingsRow("settings", "الوضع الليلي", "يتبع إعدادات جهازك") +
          settingsRow("shield", "الخصوصية", "إدارة الذاكرة والبيانات") +
          settingsRow("messages", "الإشعارات", "تنبيهات الاستخدام والاشتراك") +
          settingsRow("models", "إدارة الاشتراك", "الباقة والترقية والفواتير") +
          settingsRow("files", "تصدير البيانات", "تنزيل نسخة من بياناتك") +
          settingsRow("logout", "حذف الحساب", "طلب حذف آمن للحساب") +
          '</div>' +
          stateBlocks("لا توجد إعدادات إضافية."));
      }

      function renderHelp() {
        var cards = [
          listCard("help", "الأسئلة الشائعة", "إجابات سريعة على الأسئلة المتكررة", "فتح", "help-faq"),
          listCard("settings", "مشاكل تسجيل الدخول", "حل مشاكل الدخول وكلمة المرور", "فتح", "help-login"),
          listCard("models", "الاشتراكات والدفع", "معلومات الباقات والفواتير", "فتح", "help-billing"),
          listCard("messages", "التواصل مع الدعم", "أرسل طلب مساعدة للفريق", "دعم", "help-support"),
          listCard("shield", "الإبلاغ عن مشكلة", "أبلغنا عن خلل أو اقتراح", "إبلاغ", "help-report")
        ].join("");

        return sectionShell("help", "المساعدة", "مركز المساعدة والإجابة على استفساراتك.",
          searchBox("ابحث في المساعدة...") +
          '<div class="section-list" data-search-list>' + cards + '</div>' +
          '<button class="primary-section-btn" type="button" data-section-action="help-support">بدء محادثة دعم</button>' +
          stateBlocks("لا توجد نتائج في المساعدة."));
      }

      function renderLogout() {
        return sectionShell("logout", "تسجيل الخروج", "تسجيل الخروج من حسابك بأمان من جميع الأجهزة.",
          '<article class="logout-card">' +
          '<span class="section-icon">' + iconSvg("logout") + '</span>' +
          '<h2>هل أنت متأكد من تسجيل الخروج؟</h2>' +
          '<p>سيتم تسجيل خروجك من الجلسة الحالية. يمكنك تسجيل الدخول مرة أخرى في أي وقت.</p>' +
          '<button class="primary-section-btn" type="button" data-logout-confirm>تسجيل الخروج</button>' +
          '<button class="filter-chip" type="button" data-mobile-cancel>إلغاء</button>' +
          '<small>بياناتك ومحادثاتك تبقى محفوظة في حسابك.</small>' +
          '</article>' +
          stateBlocks("لا توجد إجراءات."));
      }

      function renderSection(sectionKey) {
        if (!main || !mobilePage) return;
        var renderers = {
          messages: renderMessages,
          files: renderFiles,
          tools: renderTools,
          models: renderModels,
          settings: renderSettings,
          help: renderHelp,
          logout: renderLogout
        };
        var renderer = renderers[sectionKey] || renderMessages;
        mobilePage.classList.add("has-mobile-section");
        main.innerHTML = renderer();
        drawerLinks.forEach(function (link) {
          link.classList.toggle("is-active", link.dataset.mobileSection === sectionKey);
        });
        setDrawerOpen(false);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showNotice(message) {
        var notice = main ? main.querySelector("[data-section-notice]") : null;
        if (!notice) return;
        var paragraph = notice.querySelector("p");
        if (paragraph) paragraph.textContent = message;
        notice.hidden = false;
      }

      function filterCurrentSection(query) {
        var cards = main ? Array.prototype.slice.call(main.querySelectorAll("[data-search-list] > button")) : [];
        var empty = main ? main.querySelector("[data-empty-state]") : null;
        var value = String(query || "").trim().toLowerCase();
        var visibleCount = 0;
        cards.forEach(function (card) {
          var isVisible = !value || card.textContent.toLowerCase().indexOf(value) !== -1;
          card.hidden = !isVisible;
          if (isVisible) visibleCount += 1;
        });
        if (empty) {
          empty.hidden = visibleCount !== 0;
        }
      }

      openButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          setDrawerOpen(!body.classList.contains("is-drawer-open"));
        });
      });

      closeButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          setDrawerOpen(false);
        });
      });

      if (backdrop) {
        backdrop.addEventListener("click", function () {
          setDrawerOpen(false);
        });
      }

      if (xpOpen) {
        xpOpen.addEventListener("click", function () {
          setDrawerOpen(false);
          setXpPanelOpen(true);
        });
      }

      xpCloseButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          setXpPanelOpen(false);
        });
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          setDrawerOpen(false);
          setXpPanelOpen(false);
        }
      });

      drawerLinks.forEach(function (button, index) {
        var section = navSections[index];
        if (!section) return;
        button.dataset.mobileSection = section.key;
        button.setAttribute("aria-label", section.label);
        button.addEventListener("click", function () {
          renderSection(section.key);
        });
      });

      if (main) {
        main.addEventListener("click", function (event) {
          var filter = event.target.closest("[data-filter-chip]");
          var model = event.target.closest("[data-model-key]");
          var action = event.target.closest("[data-section-action]");
          var logout = event.target.closest("[data-logout-confirm]");
          var cancel = event.target.closest("[data-mobile-cancel]");
          var home = event.target.closest("[data-mobile-home]");

          if (home) {
            mobilePage.classList.remove("has-mobile-section");
            main.innerHTML = homeMarkup;
            drawerLinks.forEach(function (link) {
              link.classList.remove("is-active");
            });
            window.scrollTo({ top: 0, behavior: "smooth" });
            return;
          }

          if (filter) {
            Array.prototype.slice.call(filter.parentElement.querySelectorAll(".filter-chip")).forEach(function (chip) {
              chip.classList.toggle("active", chip === filter);
            });
            showNotice("تم تطبيق الفلتر: " + filter.textContent);
          }

          if (model) {
            saveModel(model.dataset.modelKey);
            renderSection("models");
            showNotice("تم اختيار النموذج بنجاح.");
          }

          if (action) {
            showNotice("تم تجهيز القسم. يمكنك المتابعة من هنا.");
          }

          if (logout) {
            showNotice("تم تجهيز طلب تسجيل الخروج.");
          }

          if (cancel) {
            mobilePage.classList.remove("has-mobile-section");
            main.innerHTML = homeMarkup;
            drawerLinks.forEach(function (link) {
              link.classList.remove("is-active");
            });
          }
        });

        main.addEventListener("input", function (event) {
          if (event.target.matches("[data-section-search]")) {
            filterCurrentSection(event.target.value);
          }
        });
      }

      if (composer) {
        composer.addEventListener("submit", function (event) {
          event.preventDefault();
        });
      }
    })();
  </script>
</body>
</html>
