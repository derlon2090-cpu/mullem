services:
  - type: keyvalue
    name: mullem-staging-ai-redis
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: mullem-staging
    runtime: node
    plan: starter
    region: oregon
    branch: staging
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: RELEASE_CHANNEL
        value: staging
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_RESPONSES_ENDPOINT
        value: https://api.openai.com/v1/responses
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "500"
      - key: MAX_HISTORY_MESSAGES
        value: "5"
      - key: TEXT_MESSAGE_XP_COST
        value: "10"
      - key: IMAGE_GENERATION_XP_COST
        value: "15"
      - key: ATTACHMENT_ANALYSIS_XP_COST
        value: "20"
      - key: DAILY_LOGIN_XP_REWARD
        value: "5"
      - key: DB_CLIENT
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mullem-staging-ai-redis
          property: connectionString
      - key: SENTRY_DSN
        sync: false
      - key: AI_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: mullem-staging-ai-service
          property: hostport
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_DAILY_COST_LIMIT
        value: "5"
      - key: AI_SAFE_MODE_ENABLED
        value: "false"
      - key: ORLIXOR_ENABLE_EMBEDDINGS
        value: "false"
      - key: FEATURE_BETA_FEATURES
        value: "true"

  - type: worker
    name: mullem-staging-ai-worker
    runtime: node
    plan: starter
    region: oregon
    branch: staging
    buildCommand: npm run render:build
    startCommand: npm run ai:worker
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: RELEASE_CHANNEL
        value: staging
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mullem-staging-ai-redis
          property: connectionString
      - key: SENTRY_DSN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ORLIXOR_ENABLE_EMBEDDINGS
        value: "false"

  - type: pserv
    name: mullem-staging-ai-service
    runtime: node
    plan: starter
    region: oregon
    branch: staging
    buildCommand: npm run render:build
    startCommand: npm run ai:service
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: RELEASE_CHANNEL
        value: staging
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mullem-staging-ai-redis
          property: connectionString
      - key: SENTRY_DSN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ORLIXOR_ENABLE_EMBEDDINGS
        value: "false"
