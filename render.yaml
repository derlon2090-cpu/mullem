services:
  - type: web
    name: mullem
    runtime: node
    plan: starter
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_RESPONSES_ENDPOINT
        value: https://api.openai.com/v1/responses
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "500"
      - key: MAX_HISTORY_MESSAGES
        value: "5"
      - key: TEXT_MESSAGE_XP_COST
        value: "10"
      - key: IMAGE_GENERATION_XP_COST
        value: "15"
      - key: ATTACHMENT_ANALYSIS_XP_COST
        value: "20"
      - key: DAILY_LOGIN_XP_REWARD
        value: "5"
      - key: DB_CLIENT
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_DAILY_COST_LIMIT
        value: "25"
      - key: AI_SAFE_MODE_ENABLED
        value: "false"
      - key: ORLIXOR_ENABLE_EMBEDDINGS
        value: "false"
